                                              AssigneeEmail
                                            ),
                                            With(
                                              { locAssigneeEmail: Value },
                                              {
                                                AssigneeCount: CountRows(Filter(colRequestAll, AssigneeEmail = locAssigneeEmail, StatusKey <> "Completed", StatusKey <> "Rejected", StatusKey <> "Cancelled")),
                                                AssigneeDisplayName: LookUp(colRequestAll, AssigneeEmail = locAssigneeEmail).AssigneeName
                                              }
                                            )
