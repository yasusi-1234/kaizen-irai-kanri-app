Screens:
  HomeScreen:
    Properties:
      Fill: =RGBA(246, 247, 249, 1)
      OnVisible: |-
        =ClearCollect(
          colRequestAll,
          AddColumns(
            依頼,
            RequestId, ID,
            CategoryTitle, CategoryId.Value,
            PriorityTitle, PriorityId.Value,
            StatusTitle, StatusId.Value,
            StatusKey, LookUp(ステータスマスタ, ID = StatusId.Id).StatusKey,
            RequesterName, Requester.DisplayName,
            RequesterEmail, Requester.Email,
            AssigneeName, Assignee.DisplayName,
            AssigneeEmail, Assignee.Email,
            VisibilityValue, Visibility.Value
          )
        )
    Children:
      - grpRootHm:
          Control: GroupContainer
          Variant: AutoLayout
          Properties:
            DropShadow: =DropShadow.None
            Height: =Parent.Height
            LayoutAlignItems: =LayoutAlignItems.Stretch
            LayoutDirection: =LayoutDirection.Horizontal
            Width: =Parent.Width
          Children:
            - grpSideNavHm:
                Control: GroupContainer
                Variant: AutoLayout
                Properties:
                  AlignInContainer: =AlignInContainer.Start
                  DropShadow: =DropShadow.None
                  Fill: =RGBA(255, 255, 255, 1)
                  FillPortions: =0
                  Height: =Parent.Height
                  LayoutDirection: =LayoutDirection.Vertical
                  LayoutGap: =4
                  PaddingBottom: =16
                  PaddingLeft: =12
                  PaddingRight: =12
                  PaddingTop: =16
                  Width: =220
                Children:
                  - txtAppTitleHm:
                      Control: ModernText
                      Properties:
                        AlignInContainer: =AlignInContainer.Start
                        Color: =RGBA(17, 24, 39, 1)
                        FontWeight: =FontWeight.Bold
                        Height: =40
                        Size: =16
                        Text: ="改善依頼管理アプリ"
                        Width: =196
                  - grpBtnNavHomeHmShadow:
                      Control: GroupContainer
                      Variant: ManualLayout
                      Properties:
                        AlignInContainer: =AlignInContainer.Start
                        DropShadow: =DropShadow.Semilight
                        FillPortions: =0
                        Height: =44
                        Width: =196
                      Children:
                        - btnNavHomeHm:
                            Control: ModernButton
                            Properties:
                              Align: =Align.Left
                              Height: =44
                              Icon: ="Home"
                              OnSelect: =Navigate(HomeScreen, ScreenTransition.None)
                              Text: ="ホーム"
                              Width: =196
                              X: =0
                              Y: =0
                  - grpBtnNavListHmShadow:
                      Control: GroupContainer
                      Variant: ManualLayout
                      Properties:
                        AlignInContainer: =AlignInContainer.Start
                        DropShadow: =DropShadow.Semilight
                        FillPortions: =0
                        Height: =44
                        Width: =196
                      Children:
                        - btnNavListHm:
                            Control: ModernButton
                            Properties:
                              Align: =Align.Left
                              Appearance: =ButtonAppearance.Subtle
                              Height: =44
                              Icon: ="DocumentBulletList"
                              OnSelect: |-
                                =Navigate(RequestListScreen, ScreenTransition.None, { locMyRequestsOnly: false })
                              Text: ="依頼一覧"
                              Width: =196
                              X: =0
                              Y: =0
                  - grpBtnNavFormHmShadow:
                      Control: GroupContainer
                      Variant: ManualLayout
                      Properties:
                        AlignInContainer: =AlignInContainer.Start
                        DropShadow: =DropShadow.Semilight
                        FillPortions: =0
                        Height: =44
                        Width: =196
                      Children:
                        - btnNavFormHm:
                            Control: ModernButton
                            Properties:
                              Align: =Align.Left
                              Appearance: =ButtonAppearance.Subtle
                              Height: =44
                              Icon: ="Add"
                              OnSelect: =Navigate(RequestFormScreen, ScreenTransition.None)
                              Text: ="依頼登録"
                              Width: =196
                              X: =0
                              Y: =0
                  - grpBtnNavDashboardHmShadow:
                      Control: GroupContainer
                      Variant: ManualLayout
                      Properties:
                        AlignInContainer: =AlignInContainer.Start
                        DropShadow: =DropShadow.Semilight
                        FillPortions: =0
                        Height: =44
                        Width: =196
                      Children:
                        - btnNavDashboardHm:
                            Control: ModernButton
                            Properties:
                              Align: =Align.Left
                              Appearance: =ButtonAppearance.Subtle
                              Height: =44
                              Icon: ="PulseSquare"
                              OnSelect: =Navigate(DashboardScreen, ScreenTransition.None)
                              Text: ="ダッシュボード"
                              Width: =196
                              X: =0
                              Y: =0
                  - grpBtnNavMasterHmShadow:
                      Control: GroupContainer
                      Variant: ManualLayout
                      Properties:
                        AlignInContainer: =AlignInContainer.Start
                        DropShadow: =DropShadow.Semilight
                        FillPortions: =0
                        Height: =44
                        Width: =196
                      Children:
                        - btnNavMasterHm:
                            Control: ModernButton
                            Properties:
                              Align: =Align.Left
                              Appearance: =ButtonAppearance.Subtle
                              Height: =44
                              Icon: ="Settings"
                              OnSelect: =Navigate(MasterManagementScreen, ScreenTransition.None)
                              Text: ="マスタ管理"
                              Width: =196
                              X: =0
                              Y: =0
            - grpMainHm:
                Control: GroupContainer
                Variant: AutoLayout
                Properties:
                  AlignInContainer: =AlignInContainer.Start
                  DropShadow: =DropShadow.None
                  Height: =Parent.Height
                  LayoutDirection: =LayoutDirection.Vertical
                  LayoutGap: =20
                  PaddingBottom: =24
                  PaddingLeft: =24
                  PaddingRight: =24
                  PaddingTop: =24
                  Width: =Parent.Width - 220
                Children:
                  - grpHeaderRowHm:
                      Control: GroupContainer
                      Variant: AutoLayout
                      Properties:
                        AlignInContainer: =AlignInContainer.Start
                        DropShadow: =DropShadow.None
                        FillPortions: =0
                        Height: =56
                        LayoutAlignItems: =LayoutAlignItems.Center
                        LayoutDirection: =LayoutDirection.Horizontal
                        LayoutJustifyContent: =LayoutJustifyContent.SpaceBetween
                        Width: =Parent.Width - 48
                      Children:
                        - txtGreeting:
                            Control: ModernText
                            Properties:
                              AlignInContainer: =AlignInContainer.Center
                              Color: =RGBA(17, 24, 39, 1)
                              FontWeight: =FontWeight.Bold
                              Height: =46
                              Size: =24
                              Text: =$"おはようございます、{glbCurrentUserName} さん"
                              Width: =500
                        - txtUserInfo:
                            Control: ModernText
                            Properties:
                              Align: =Align.Right
                              AlignInContainer: =AlignInContainer.Center
                              Color: =RGBA(107, 114, 128, 1)
                              Size: =14
                              Text: =glbCurrentUserName
                              Width: =260
