                                                Layout: =ButtonLayout.IconOnly
                                                LayoutMinHeight: =0
                                                LayoutMinWidth: =0
                                                OnSelect: |-
                                                  =IfError(
                                                    Remove(アプリ管理者マスタ, ThisItem);
                                                    Notify("管理者から解除しました。", NotificationType.Success),
                                                    Notify("解除に失敗しました。", NotificationType.Error, 5000)
                                                  )
                                                Text: ="削除"
                                                Width: =40
                                                X: =0
                                                Y: =0
